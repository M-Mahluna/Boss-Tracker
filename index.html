<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@400;600&display=swap');

body{
    margin:0;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    font-family: 'Cormorant Garamond', serif;
}

.container{
    width:90%;
    max-width:1000px;
    margin:50px 0;
    background: rgba(20,20,20,0.9);
    color:#eaeaea;
    padding:30px;
    border-radius:20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.8);
    text-align:center;
}

h1{
    font-size:3.5rem;
    color:#e6b800;
    text-shadow:0 0 25px rgba(230,184,0,0.5);
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
}

.game-title{
    font-size:2.6rem;
    margin-top:60px;
    border-bottom:4px solid #e6b800;
    padding-bottom:12px;
    color:#ffd86b;
    font-family: 'Uncial Antiqua', serif;
}

.section-title{
    font-size:2rem;
    margin-top:30px;
    color:#f5c84c;
}

.progress-container{
    width:90%;
    background:#2a2a2a;
    border-radius:12px;
    margin:15px auto;
    position: relative;
    height:30px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#1A4C39);
    transition: width 1s ease-in-out;
}

.progress-text{
    position:absolute;
    width:100%;
    text-align:center;
    top:0;
    left:0;
    font-weight:bold;
    line-height:30px;
    color:#ffd86b;
}

.boss{
    margin:6px 0;
    font-size:1.2rem;
}

.done{
    color:#00ffcc;
}

.notdone{
    color:#ff6b6b;
}

.deaths{
    font-size:1.4rem;
    margin-top:10px;
    color:#ffd86b;
}

.boss-link{
    text-decoration: none;
    color: inherit;
    transition: 0.2s;
}

.boss-link:hover{
    color: #e6b800;
    text-shadow: 0 0 8px rgba(230,184,0,0.6);
    cursor: pointer;
}

.preview-img{
    position: absolute;
    width: 260px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
    pointer-events: none;
    display: none;
    z-index: 1000;
}

.preview-box{
    position:absolute;
    display:none;
    z-index:1000;
    pointer-events:none;
}

.preview-box img{
    width:260px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,0.8);
    display:block;
}

.preview-deaths{
    background:#1a1a1a;
    color:#ffd86b;
    padding:6px 10px;
    font-size:14px;
    text-align:center;
    border-radius:0 0 10px 10px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}
    .game-header{
    cursor:pointer;
    transition:0.3s;
    padding:10px;
    border-radius:10px;
}

.game-header:hover{
    background:rgba(255,255,255,0.05);
}

.game-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.6s ease;
}

.game-content.open{
    max-height:20000px;
}
</style>

function createGame(gameKey){
    const game = games[gameKey];
    const container = document.createElement("div");

    // Spieltitel
    const title = document.createElement("h2");
title.className = "game-title game-header";
title.innerText = "▶ " + game.name;

const gameContent = document.createElement("div");
gameContent.className = "game-content";

title.onclick = () => {

    gameContent.classList.toggle("open");

    if(gameContent.classList.contains("open")){
        title.innerText = "▼ " + game.name;
    } else {
        title.innerText = "▶ " + game.name;
    }
};

container.appendChild(title);
container.appendChild(gameContent);

    // Todesanzeige
    const deathDiv = document.createElement("div");
    deathDiv.className="deaths";
    deathDiv.innerText="Tode insgesamt: " + game.deaths;
    gameContent.appendChild(deathDiv);

    // Funktion um Balken zu erstellen
    function createProgressBar(percent){
        const bar=document.createElement("div");
        bar.className="progress-container";

        const fill=document.createElement("div");
        fill.className="progress-fill";
        fill.style.width=percent+"%";

        const text=document.createElement("div");
        text.className="progress-text";
        text.innerText=percent+"%";

        bar.appendChild(fill);
        bar.appendChild(text);
        return bar;
    }

    let totalDone=0,totalCount=0;

    // Gesamtfortschritt zuerst berechnen
    game.sections.forEach(section=>{
        totalDone += section.bosses.filter(b=>b.completed).length;
        totalCount += section.bosses.length;
    });

    const totalPercent = Math.round((totalDone/totalCount)*100);
    const totalTitle = document.createElement("div");
    totalTitle.className="section-title";
    totalTitle.innerText="Gesamtfortschritt";
    gameContent.appendChild(totalTitle);
    gameContent.appendChild(createProgressBar(totalPercent));

    // Abschnitts-Fortschritt
    game.sections.forEach(section=>{
        const sectionDone = section.bosses.filter(b=>b.completed).length;
        const sectionTotal = section.bosses.length;

        const sectionPercent = Math.round((sectionDone/sectionTotal)*100);

        // Abschnittstitel
        const sectionTitle=document.createElement("div");
        sectionTitle.className="section-title";
        sectionTitle.innerText=section.name;
        gameContent.appendChild(sectionTitle);

        // Abschnittsbalken
        gameContent.appendChild(createProgressBar(sectionPercent));

        // Bossliste
      section.bosses
    .sort((a,b)=> b.completed - a.completed)
    .forEach(boss=>{

        const div = document.createElement("div");
        div.className = "boss " + (boss.completed ? "done" : "notdone");

        if(boss.clip){

            const link = document.createElement("a");
            link.href = boss.clip;
            link.target = "_blank";
            link.className = "boss-link";
            link.innerText = (boss.completed ? "✔ " : "✖ ") + boss.name;

            let previewSrc = null;

            if(boss.clip.includes("youtube") || boss.clip.includes("youtu.be")){

                function getYouTubeID(url){
                    try {
                        const parsedUrl = new URL(url);
                        if(parsedUrl.hostname.includes("youtube.com")){
                            return parsedUrl.searchParams.get("v");
                        }
                        if(parsedUrl.hostname.includes("youtu.be")){
                            return parsedUrl.pathname.split("/")[1];
                        }
                    } catch(e){
                        return null;
                    }
                    return null;
                }

                const videoID = getYouTubeID(boss.clip);

                if(videoID){
                    previewSrc = "https://img.youtube.com/vi/" + videoID + "/hqdefault.jpg";
                }
            }

           
            if(boss.thumbnail){
                previewSrc = boss.thumbnail;
            }

            // Wenn Preview existiert → Hover aktivieren
            if(previewSrc){

                const preview = document.createElement("img");
                preview.className = "preview-img";
                preview.src = previewSrc;

                document.body.appendChild(preview);

                link.addEventListener("mousemove", e => {
                    preview.style.display = "block";
                    preview.style.left = e.pageX + 20 + "px";
                    preview.style.top = e.pageY + 20 + "px";
                });

                link.addEventListener("mouseleave", () => {
                    preview.style.display = "none";
                });
            }

            div.appendChild(link);
if(boss.completed && boss.clip){

    let previewSrc = null;

    //  1. Eigenes Bild hat IMMER Vorrang
    if(boss.thumbnail){
        previewSrc = boss.thumbnail;
    }

    //  2. Sonst YouTube automatisch
    else if(boss.clip.includes("youtube") || boss.clip.includes("youtu.be")){

        function getYouTubeID(url){
            try{
                const parsedUrl = new URL(url);
                if(parsedUrl.hostname.includes("youtube.com")){
                    return parsedUrl.searchParams.get("v");
                }
                if(parsedUrl.hostname.includes("youtu.be")){
                    return parsedUrl.pathname.split("/")[1];
                }
            }catch(e){ return null; }
            return null;
        }

        const videoID = getYouTubeID(boss.clip);

        if(videoID){
            previewSrc = "https://img.youtube.com/vi/" + videoID + "/hqdefault.jpg";
        }
    }

    //  3. Wenn wir ein Bild haben → Hover bauen
    if(previewSrc){

        const previewBox = document.createElement("div");
        previewBox.className = "preview-box";

        const previewImg = document.createElement("img");
        previewImg.src = previewSrc;

        const deathText = document.createElement("div");
        deathText.className = "preview-deaths";
        deathText.innerText = "Tode: " + boss.deaths;

        previewBox.appendChild(previewImg);
        previewBox.appendChild(deathText);
        document.body.appendChild(previewBox);

        link.addEventListener("mousemove", e => {
            previewBox.style.display = "block";
            previewBox.style.left = e.pageX + 20 + "px";
            previewBox.style.top = e.pageY + 20 + "px";
        });

        link.addEventListener("mouseleave", () => {
            previewBox.style.display = "none";
        });
    }
}

        } else {
            div.innerText = (boss.completed ? "✔ " : "✖ ") + boss.name;
        }

        gameContent.appendChild(div);
    });

    });

    document.getElementById("content").appendChild(container);
}

createGame("bloodborne");
