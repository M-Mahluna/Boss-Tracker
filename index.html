<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mahluna – Boss Tracker</title>

<style>
:root {
  --gold: #e6b800;
  --gold-dim: #a07c00;
  --gold-bright: #ffd86b;
  --blood: #8b0000;
  --ash: #c0b090;
  --dark: #080808;
  --dark2: #111010;
  --panel: rgba(12,10,8,0.92);
}

*{ box-sizing: border-box; margin:0; padding:0; }

html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ═══════════════════════════════════════
   BACKGROUND LAYERS
═══════════════════════════════════════ */

#bg-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Deep background gradient */
#bg-scene::before {
  content:'';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(60,30,0,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(100,10,10,0.2) 0%, transparent 60%),
    linear-gradient(170deg, #0a0806 0%, #0d0b08 40%, #08060a 100%);
}

/* Elden Ring style fog/rune layers */
.bg-rune {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(230,184,0,0.04);
  animation: runeRotate linear infinite;
}
.bg-rune:nth-child(1){ width:900px; height:900px; top:50%; left:50%; transform:translate(-50%,-50%); animation-duration:80s; }
.bg-rune:nth-child(2){ width:650px; height:650px; top:50%; left:50%; transform:translate(-50%,-50%); border-color:rgba(230,184,0,0.06); animation-duration:55s; animation-direction:reverse; }
.bg-rune:nth-child(3){ width:400px; height:400px; top:50%; left:50%; transform:translate(-50%,-50%); border-color:rgba(230,184,0,0.08); animation-duration:35s; }

@keyframes runeRotate {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotate(360deg); }
}

/* Particle embers */
.ember {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: emberFloat linear infinite;
}

@keyframes emberFloat {
  0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
  10%  { opacity: 0.8; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-20px) translateX(var(--drift)); opacity: 0; }
}

/* 3D perspective background image (Elden Ring style art using CSS shapes) */
#bg-world {
  position: absolute;
  inset: 0;
  perspective: 600px;
}

.bg-mountain {
  position: absolute;
  bottom: 0;
  width: 0;
  height: 0;
  border-style: solid;
  opacity: 0.06;
  filter: blur(1px);
  transform-origin: bottom center;
  transform: rotateX(8deg);
}

.bg-mountain:nth-child(1){
  left: 5%;
  border-width: 0 180px 320px 180px;
  border-color: transparent transparent #e6b800 transparent;
}
.bg-mountain:nth-child(2){
  left: 20%;
  border-width: 0 260px 480px 260px;
  border-color: transparent transparent #c8a000 transparent;
  opacity: 0.05;
}
.bg-mountain:nth-child(3){
  right: 10%;
  border-width: 0 200px 380px 200px;
  border-color: transparent transparent #e6b800 transparent;
}
.bg-mountain:nth-child(4){
  right: 28%;
  border-width: 0 300px 550px 300px;
  border-color: transparent transparent #b09000 transparent;
  opacity: 0.04;
}

/* Erdtree-inspired golden light beam */
.bg-beam {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 60%;
  background: linear-gradient(180deg, rgba(230,184,0,0.12) 0%, transparent 100%);
  filter: blur(8px);
  animation: beamPulse 4s ease-in-out infinite;
}
.bg-beam::after {
  content:'';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 300px;
  background: radial-gradient(ellipse 40px 150px at center top, rgba(230,184,0,0.08) 0%, transparent 70%);
  filter: blur(15px);
}

@keyframes beamPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* Grain overlay */
#grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */

#page-wrapper {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  padding: 0 40px;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 900px;
  margin: 60px 0 80px;
  padding: 40px 36px;
  background: var(--panel);
  border-radius: 4px;
  border: 1px solid rgba(230,184,0,0.12);
  box-shadow:
    0 0 80px rgba(0,0,0,0.9),
    0 0 0 1px rgba(230,184,0,0.04) inset;
  backdrop-filter: blur(8px);
  text-align: center;
}



/* ═══════════════════════════════════════
   HERO TITLE
═══════════════════════════════════════ */

.hero-title-wrap {
  position: relative;
  margin-bottom: 8px;
  padding-bottom: 24px;
}

.hero-eyebrow {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.7;
}

.hero-name {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: clamp(2.4rem, 5vw, 3.8rem);
  font-weight: 900;
  color: var(--gold-bright);
  line-height: 1;
  text-shadow:
    0 0 40px rgba(230,184,0,0.5),
    0 0 80px rgba(230,184,0,0.2);
  letter-spacing: 0.02em;
  animation: titleGlow 3s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 40px rgba(230,184,0,0.5), 0 0 80px rgba(230,184,0,0.2); }
  50%       { text-shadow: 0 0 60px rgba(230,184,0,0.8), 0 0 120px rgba(230,184,0,0.35); }
}

.hero-subtitle-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.hero-progress-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(230,184,0,0.06);
  border: 1px solid rgba(230,184,0,0.18);
  border-radius: 100px;
  padding: 5px 16px;
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.75rem;
  color: var(--gold-bright);
  letter-spacing: 0.1em;
}

.hero-progress-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%,100% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.5); opacity:0.5; }
}

.hero-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold-bright) 50%, var(--gold) 70%, transparent);
  margin-top: 20px;
  opacity: 0.35;
  position: relative;
}

.hero-divider::before {
  content: '✦';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  color: var(--gold);
  font-size: 0.9rem;
  background: var(--panel);
  padding: 0 10px;
  opacity: 0.7;
}

/* ═══════════════════════════════════════
   SEARCH
═══════════════════════════════════════ */

.search-wrap {
  position: relative;
  width: 80%;
  max-width: 460px;
  margin: 28px auto 44px;
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold-dim);
  font-size: 1rem;
  pointer-events: none;
}

.search-box {
  width: 100%;
  padding: 13px 18px 13px 42px;
  border-radius: 3px;
  border: 1px solid rgba(230,184,0,0.18);
  font-size: 1rem;
  background: rgba(0,0,0,0.5);
  color: #fff;
  outline: none;
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-box::placeholder { color: rgba(200,175,100,0.35); }

.search-box:focus {
  border-color: rgba(230,184,0,0.5);
  box-shadow: 0 0 20px rgba(230,184,0,0.12);
}

/* ═══════════════════════════════════════
   GAME SECTION
═══════════════════════════════════════ */

.game-block { margin-bottom: 4px; }

.game-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  border: 1px solid rgba(230,184,0,0.08);
  border-radius: 3px;
  background: rgba(230,184,0,0.02);
  transition: background 0.3s, border-color 0.3s;
  user-select: none;
}

.game-header:hover {
  background: rgba(230,184,0,0.06);
  border-color: rgba(230,184,0,0.2);
}

.game-header-arrow {
  font-size: 0.7rem;
  color: var(--gold-dim);
  transition: transform 0.4s;
  flex-shrink: 0;
}

.game-header.open .game-header-arrow { transform: rotate(90deg); }

.game-header-name {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--gold-bright);
  flex: 1;
  text-align: left;
}

.game-header-stat {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.7rem;
  color: var(--gold-dim);
  letter-spacing: 0.1em;
  text-align: right;
  line-height: 1.5;
}

.game-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.7s cubic-bezier(0.4,0,0.2,1);
  border: 1px solid transparent;
  border-top: none;
}

.game-content.open {
  max-height: 40000px;
  border-color: rgba(230,184,0,0.06);
  border-radius: 0 0 3px 3px;
}

.game-content-inner {
  padding: 20px 20px 28px;
}

/* ═══════════════════════════════════════
   DEATHS DISPLAY
═══════════════════════════════════════ */

.deaths-display {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(139,0,0,0.12);
  border: 1px solid rgba(139,0,0,0.3);
  border-radius: 100px;
  padding: 6px 18px;
  margin-bottom: 22px;
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.8rem;
  color: #ff8080;
  letter-spacing: 0.12em;
}

/* ═══════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════ */

.prog-label {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  margin-top: 22px;
}

.prog-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 4px;
  position: relative;
}

.prog-fill {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, #1A4C39, #00cc88);
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
  position: relative;
}

.prog-fill::after {
  content:'';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 20px;
  background: rgba(255,255,255,0.3);
  filter: blur(4px);
  border-radius: 100px;
}

.prog-pct {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.65rem;
  color: rgba(0,204,136,0.7);
  text-align: right;
  margin-bottom: 18px;
  letter-spacing: 0.1em;
}

/* ═══════════════════════════════════════
   SECTION TITLE
═══════════════════════════════════════ */

.section-title {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 1rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin: 28px 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(230,184,0,0.15);
  text-align: left;
  position: relative;
}

.section-title::before {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 60px;
  height: 1px;
  background: var(--gold);
}

/* ═══════════════════════════════════════
   BOSS ROWS
═══════════════════════════════════════ */

.boss-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 3px;
  margin-bottom: 3px;
  transition: background 0.2s;
}

.boss-row:hover { background: rgba(255,255,255,0.03); }

.boss-status {
  font-size: 0.75rem;
  flex-shrink: 0;
  width: 16px;
}

.boss-status.done   { color: #00cc88; }
.boss-status.undone { color: #ff6b6b; }

.boss-name {
  flex: 1;
  font-size: 1.05rem;
  text-align: left;
  line-height: 1.2;
}

.boss-name.done-text   { color: rgba(200,240,220,0.85); }
.boss-name.undone-text { color: rgba(200,180,180,0.6); }

.boss-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* YouTube / Twitch icon links */
.clip-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 4px;
  text-decoration: none;
  transition: transform 0.2s, opacity 0.2s;
  opacity: 0.75;
}

.clip-btn:hover { transform: scale(1.15); opacity: 1; }

.clip-btn.yt-btn {
  background: rgba(255,0,0,0.15);
  border: 1px solid rgba(255,0,0,0.3);
  color: #ff4444;
}

.clip-btn.tw-btn {
  background: rgba(145,70,255,0.15);
  border: 1px solid rgba(145,70,255,0.3);
  color: #9146ff;
}

.clip-btn svg { width: 14px; height: 14px; fill: currentColor; }

/* death badge next to boss */
.boss-deaths-badge {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.65rem;
  color: #ff8080;
  background: rgba(139,0,0,0.15);
  border: 1px solid rgba(139,0,0,0.25);
  border-radius: 100px;
  padding: 2px 8px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

/* ═══════════════════════════════════════
   SEARCH RESULTS
═══════════════════════════════════════ */

#search-results {
  margin-bottom: 36px;
}

.search-result-header {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(230,184,0,0.1);
  text-align: left;
}

.search-result-group {
  margin-bottom: 12px;
}

.search-result-game {
  font-family: "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 6px;
  text-align: left;
  opacity: 0.7;
}

/* ═══════════════════════════════════════
   RESPONSIVE: hide sidebars on small
═══════════════════════════════════════ */


</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────

function getYouTubeID(url) {
  try {
    const u = new URL(url);
    if(u.hostname.includes("youtube.com")) return u.searchParams.get("v");
    if(u.hostname.includes("youtu.be")) return u.pathname.split("/")[1].split("?")[0];
  } catch(e) {}
  return null;
}

function isYouTube(url) { return url && (url.includes("youtube") || url.includes("youtu.be")); }
function isTwitch(url)  { return url && url.includes("twitch.tv"); }

function makeBossRow(boss, gameName) {
  const row = document.createElement("div");
  row.className = "boss-row";
  row.dataset.bossName = boss.name.toLowerCase();
  row.dataset.game = gameName;

  // Status icon
  const status = document.createElement("span");
  status.className = "boss-status " + (boss.completed ? "done" : "undone");
  status.textContent = boss.completed ? "✔" : "✖";
  row.appendChild(status);

  // Boss name
  const nameEl = document.createElement("span");
  nameEl.className = "boss-name " + (boss.completed ? "done-text" : "undone-text");
  nameEl.textContent = boss.name;
  row.appendChild(nameEl);

  // Actions area
  const actions = document.createElement("div");
  actions.className = "boss-actions";

  // Deaths badge (only if deaths field exists and boss completed)
  if(boss.completed && typeof boss.deaths === "number") {
    const badge = document.createElement("span");
    badge.className = "boss-deaths-badge";
    badge.textContent = "☠ " + boss.deaths;
    actions.appendChild(badge);
  }

  // Clip button
  if(boss.clip) {
    const btn = document.createElement("a");
    btn.href = boss.clip;
    btn.target = "_blank";
    btn.rel = "noopener noreferrer";

    if(isYouTube(boss.clip)) {
      btn.className = "clip-btn yt-btn";
      btn.innerHTML = YT_SVG;
      btn.title = "YouTube Clip";
    } else if(isTwitch(boss.clip)) {
      btn.className = "clip-btn tw-btn";
      btn.innerHTML = TW_SVG;
      btn.title = "Twitch Clip";
    } else {
      btn.className = "clip-btn yt-btn";
      btn.innerHTML = YT_SVG;
      btn.title = "VOD ansehen";
    }
    actions.appendChild(btn);
  }

  if(actions.children.length > 0) row.appendChild(actions);

  return row;
}

// ─── GLOBAL STATS ────────────────────────────────────────

function computeGlobalStats() {
  let total = 0, done = 0;
  Object.values(games).forEach(g => {
    g.sections.forEach(s => {
      s.bosses.forEach(b => { total++; if(b.completed) done++; });
    });
  });
  return { total, done, pct: Math.round((done/total)*100) };
}

// ─── BUILD PROGRESS BARS ─────────────────────────────────

function buildProgressBar(pct) {
  const wrap = document.createElement("div");
  wrap.className = "prog-bar";
  const fill = document.createElement("div");
  fill.className = "prog-fill";
  fill.style.width = "0%";
  setTimeout(() => fill.style.width = pct + "%", 100);
  wrap.appendChild(fill);
  return wrap;
}

// ─── BUILD GAME BLOCK ────────────────────────────────────

function createGame(gameKey) {
  const game = games[gameKey];

  let totalDone = 0, totalCount = 0;
  game.sections.forEach(s => {
    totalDone  += s.bosses.filter(b=>b.completed).length;
    totalCount += s.bosses.length;
  });
  const totalPct = Math.round((totalDone / totalCount) * 100);

  // Wrapper
  const block = document.createElement("div");
  block.className = "game-block";

  // Header
  const header = document.createElement("div");
  header.className = "game-header";

  const arrow = document.createElement("span");
  arrow.className = "game-header-arrow";
  arrow.textContent = "▶";

  const hName = document.createElement("span");
  hName.className = "game-header-name";
  hName.textContent = game.name;

  const hStat = document.createElement("span");
  hStat.className = "game-header-stat";
  hStat.innerHTML = `${totalDone}/${totalCount} Bosse<br>${totalPct}%`;

  header.appendChild(arrow);
  header.appendChild(hName);
  header.appendChild(hStat);
  block.appendChild(header);

  // Content
  const content = document.createElement("div");
  content.className = "game-content";
  const inner = document.createElement("div");
  inner.className = "game-content-inner";
  content.appendChild(inner);
  block.appendChild(content);

  // Deaths
  const deathEl = document.createElement("div");
  deathEl.className = "deaths-display";
  deathEl.innerHTML = `☠ Tode insgesamt: <strong style="margin-left:6px">${game.deaths}</strong>`;
  inner.appendChild(deathEl);

  // Global progress
  const gLabel = document.createElement("div");
  gLabel.className = "prog-label";
  gLabel.textContent = "Gesamtfortschritt";
  inner.appendChild(gLabel);
  inner.appendChild(buildProgressBar(totalPct));
  const gPct = document.createElement("div");
  gPct.className = "prog-pct";
  gPct.textContent = totalPct + "%";
  inner.appendChild(gPct);

  // Sections
  game.sections.forEach(section => {
    const secDone  = section.bosses.filter(b=>b.completed).length;
    const secTotal = section.bosses.length;
    const secPct   = Math.round((secDone/secTotal)*100);

    const stitle = document.createElement("div");
    stitle.className = "section-title";
    stitle.textContent = section.name;
    inner.appendChild(stitle);

    const sBar = buildProgressBar(secPct);
    inner.appendChild(sBar);
    const sPct = document.createElement("div");
    sPct.className = "prog-pct";
    sPct.textContent = `${secDone}/${secTotal} · ${secPct}%`;
    inner.appendChild(sPct);

    // Boss list sorted: done first
    const sorted = [...section.bosses].sort((a,b) => b.completed - a.completed);
    sorted.forEach(boss => {
      inner.appendChild(makeBossRow(boss, game.name));
    });
  });

  // Toggle
  let openGame = null;
  header.addEventListener("click", () => {
    const isOpen = content.classList.contains("open");

    // Close any previously open
    document.querySelectorAll(".game-content.open").forEach(el => {
      el.classList.remove("open");
      el.previousElementSibling.classList.remove("open");
      el.previousElementSibling.querySelector(".game-header-arrow").textContent = "▶";
    });

    if(!isOpen) {
      content.classList.add("open");
      header.classList.add("open");
      arrow.textContent = "▶";
    } else {
    }
  });

  document.getElementById("content").appendChild(block);
}

// ─── SEARCH ──────────────────────────────────────────────

const searchInput = document.getElementById("search");
const resultsDiv  = document.getElementById("search-results");

searchInput.addEventListener("input", function() {
  const term = this.value.trim().toLowerCase();
  resultsDiv.innerHTML = "";
  if(!term) return;

  // collect matches grouped by game
  const matches = []; // [{gameName, boss}]
  gameOrder.forEach(key => {
    const game = games[key];
    game.sections.forEach(s => {
      s.bosses.forEach(b => {
        if(b.name.toLowerCase().includes(term)) {
          matches.push({ gameName: game.name, boss: b });
        }
      });
    });
  });

  if(matches.length === 0) return;

  const hdr = document.createElement("div");
  hdr.className = "search-result-header";
  hdr.textContent = `${matches.length} Treffer für „${this.value}"`;
  resultsDiv.appendChild(hdr);

  matches.forEach(m => {
    const group = document.createElement("div");
    group.className = "search-result-group";

    const gameLabel = document.createElement("div");
    gameLabel.className = "search-result-game";
    gameLabel.textContent = m.gameName;
    group.appendChild(gameLabel);

    group.appendChild(makeBossRow(m.boss, m.gameName));
    resultsDiv.appendChild(group);
  });
});

// ─── PARALLAX BG ─────────────────────────────────────────

document.addEventListener("mousemove", e => {
  const mx = (e.clientX / window.innerWidth - 0.5) * 2;
  const my = (e.clientY / window.innerHeight - 0.5) * 2;
  document.querySelectorAll(".bg-rune").forEach((r, i) => {
    const depth = (i + 1) * 8;
    r.style.marginLeft = mx * depth + "px";
    r.style.marginTop  = my * depth + "px";
  });
  document.querySelector(".bg-beam").style.left = (50 + mx * 3) + "%";
});
